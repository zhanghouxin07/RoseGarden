<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>天翼网关设备监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header .subtitle {
            opacity: 0.9;
            font-size: 0.85rem;
        }
        
        .status-bar {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .status-card {
            background: white;
            border-radius: 10px;
            padding: 12px 8px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        
        .status-card:hover {
            transform: translateY(-3px);
        }
        
        .status-card .icon {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        
        .status-card .value {
            font-size: 1.1rem;
            font-weight: bold;
            color: #333;
        }
        
        .status-card .label {
            color: #666;
            font-size: 0.7rem;
            margin-top: 3px;
        }
        
        .status-card.connected .value {
            color: #10b981;
        }
        
        .status-card.disconnected .value {
            color: #ef4444;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .filter-group {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 5px;
            -webkit-overflow-scrolling: touch;
        }
        
        .filter-group::-webkit-scrollbar {
            display: none;
        }
        
        .filter-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 16px;
            background: white;
            color: #666;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.8rem;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .sort-group {
            display: flex;
            align-items: center;
        }
        
        .sort-select {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            background: white;
            color: #666;
            cursor: pointer;
            font-size: 0.8rem;
            outline: none;
            transition: all 0.3s ease;
            min-width: 120px;
        }
        
        .sort-select:hover {
            background: #f0f0f0;
        }
        
        .sort-select:focus {
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }
        
        .filter-btn:hover {
            background: #f0f0f0;
        }
        
        .filter-btn.active {
            background: #667eea;
            color: white;
        }
        
        .refresh-btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: white;
            color: #667eea;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .refresh-btn:hover {
            background: #f8f8f8;
            transform: scale(1.02);
        }
        
        .refresh-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .refresh-btn .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .monitor-status {
            background: rgba(255,255,255,0.95);
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px 15px;
        }
        
        .monitor-status .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .monitor-status .status-item.full-width {
            grid-column: 1 / -1;
        }
        
        .monitor-status .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6b7280;
            flex-shrink: 0;
        }
        
        .monitor-status .status-dot.running {
            background: #10b981;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .monitor-status .status-text {
            font-size: 0.8rem;
            color: #374151;
        }
        
        .monitor-status .status-value {
            font-weight: 600;
            color: #1f2937;
        }
        
        .devices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }
        
        .device-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .device-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .device-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }
        
        .device-card.type-phone::before {
            background: linear-gradient(90deg, #10b981, #34d399);
        }
        
        .device-card.type-pc::before {
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
        }
        
        .device-card.type-pad::before {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
        }
        
        .device-card.type-router::before {
            background: linear-gradient(90deg, #8b5cf6, #a78bfa);
        }
        
        .device-card.type-tv::before {
            background: linear-gradient(90deg, #ef4444, #f87171);
        }
        
        .device-card.type-smart::before {
            background: linear-gradient(90deg, #06b6d4, #22d3ee);
        }
        
        .device-card.type-unknown::before {
            background: linear-gradient(90deg, #6b7280, #9ca3af);
        }
        
        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        
        .device-icon {
            font-size: 2rem;
        }
        
        .device-type-badge {
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
        }
        
        .badge-phone { background: #d1fae5; color: #065f46; }
        .badge-pc { background: #dbeafe; color: #1e40af; }
        .badge-pad { background: #fef3c7; color: #92400e; }
        .badge-router { background: #ede9fe; color: #5b21b6; }
        .badge-tv { background: #fee2e2; color: #991b1b; }
        .badge-smart { background: #cffafe; color: #155e75; }
        .badge-unknown { background: #e5e7eb; color: #374151; }
        
        .device-name {
            font-size: 1rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 3px;
            word-break: break-all;
        }
        
        .device-brand {
            font-size: 0.75rem;
            color: #6b7280;
        }
        
        .device-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e5e7eb;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
        }
        
        .info-label {
            font-size: 0.7rem;
            color: #9ca3af;
            text-transform: uppercase;
        }
        
        .info-value {
            font-size: 0.85rem;
            color: #374151;
            font-weight: 500;
        }
        
        .speed-indicator {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e5e7eb;
        }
        
        .speed-item {
            flex: 1;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            background: #f9fafb;
        }
        
        .speed-item.upload {
            color: #10b981;
        }
        
        .speed-item.download {
            color: #3b82f6;
        }
        
        .speed-label {
            font-size: 0.7rem;
            opacity: 0.8;
        }
        
        .speed-value {
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 2px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            background: white;
            border-radius: 12px;
            color: #6b7280;
        }
        
        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            font-size: 0.85rem;
        }
        
        .last-update {
            text-align: center;
            color: white;
            opacity: 0.8;
            margin-top: 15px;
            font-size: 0.8rem;
        }
        
        @media (min-width: 769px) {
            body {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2.5rem;
            }
            
            .header .subtitle {
                font-size: 1rem;
            }
            
            .status-bar {
                gap: 15px;
                margin-bottom: 30px;
            }
            
            .status-card {
                padding: 20px;
            }
            
            .status-card .icon {
                font-size: 2rem;
                margin-bottom: 10px;
            }
            
            .status-card .value {
                font-size: 1.8rem;
            }
            
            .status-card .label {
                font-size: 0.9rem;
            }
            
            .controls {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 20px;
            }
            
            .filter-group {
                overflow-x: visible;
                padding-bottom: 0;
            }
            
            .filter-btn {
                padding: 8px 16px;
                font-size: 0.9rem;
            }
            
            .sort-select {
                padding: 8px 16px;
                font-size: 0.9rem;
                min-width: 140px;
            }
            
            .monitor-status {
                display: flex;
                justify-content: space-between;
                flex-wrap: wrap;
                gap: 10px;
                padding: 15px 20px;
            }
            
            .monitor-status .status-item.full-width {
                grid-column: auto;
            }
            
            .monitor-status .status-text {
                font-size: 0.9rem;
            }
            
            .devices-grid {
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 20px;
            }
            
            .device-card {
                padding: 20px;
            }
            
            .device-icon {
                font-size: 2.5rem;
            }
            
            .device-name {
                font-size: 1.1rem;
            }
            
            .device-brand {
                font-size: 0.85rem;
            }
            
            .last-update {
                margin-top: 20px;
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 480px) {
            .status-bar {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .status-card:nth-child(4),
            .status-card:nth-child(5) {
                grid-column: span 1;
            }
            
            .status-card:last-child {
                grid-column: 1 / -1;
            }
            
            .status-card .value {
                font-size: 1rem;
            }
            
            .devices-grid {
                grid-template-columns: 1fr;
            }
            
            .device-card {
                padding: 12px;
            }
            
            .device-icon {
                font-size: 1.8rem;
            }
            
            .device-info {
                gap: 6px;
                margin-top: 10px;
                padding-top: 10px;
            }
            
            .speed-indicator {
                gap: 8px;
                margin-top: 10px;
                padding-top: 10px;
            }
            
            .speed-item {
                padding: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 天翼网关设备监控</h1>
            <p class="subtitle">实时查看连接到您网络的所有设备</p>
        </div>
        
        <div class="status-bar" id="statusBar">
            <div class="status-card">
                <div class="icon">📡</div>
                <div class="value" id="wanStatus">--</div>
                <div class="label">WAN 状态</div>
            </div>
            <div class="status-card">
                <div class="icon">⏱️</div>
                <div class="value" id="wanUptime">--</div>
                <div class="label">在线时长</div>
            </div>
            <div class="status-card">
                <div class="icon">📱</div>
                <div class="value" id="deviceCount">--</div>
                <div class="label">在线设备</div>
            </div>
            <div class="status-card">
                <div class="icon">⬆️</div>
                <div class="value" id="totalUpSpeed">--</div>
                <div class="label">总上传</div>
            </div>
            <div class="status-card">
                <div class="icon">⬇️</div>
                <div class="value" id="totalDownSpeed">--</div>
                <div class="label">总下载</div>
            </div>
        </div>
        
        <div class="monitor-status" id="monitorStatus">
            <div class="status-item full-width">
                <div class="status-dot" id="monitorDot"></div>
                <span class="status-text">后台监控: <span class="status-value" id="monitorRunning">检测中...</span></span>
            </div>
            <div class="status-item">
                <span class="status-text">AOM上报: <span class="status-value" id="aomEnabled">--</span></span>
            </div>
            <div class="status-item">
                <span class="status-text">上报次数: <span class="status-value" id="reportCount">--</span></span>
            </div>
            <div class="status-item">
                <span class="status-text">上次上报: <span class="status-value" id="lastReport">--</span></span>
            </div>
            <div class="status-item">
                <span class="status-text">采集间隔: <span class="status-value" id="collectInterval">--</span></span>
            </div>
        </div>
        
        <div class="controls">
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="phone">📱 手机</button>
                <button class="filter-btn" data-filter="pc">💻 电脑</button>
                <button class="filter-btn" data-filter="pad">📲 平板</button>
                <button class="filter-btn" data-filter="router">🔌 路由器</button>
                <button class="filter-btn" data-filter="tv">📺 电视</button>
                <button class="filter-btn" data-filter="smart">🏠 智能设备</button>
            </div>
            <div class="sort-group">
                <select class="sort-select" id="sortSelect">
                    <option value="name-asc">设备名称 A-Z</option>
                    <option value="name-desc">设备名称 Z-A</option>
                    <option value="online-asc">在线时间 ↑</option>
                    <option value="online-desc">在线时间 ↓</option>
                    <option value="upload-asc">上传速度 ↑</option>
                    <option value="upload-desc">上传速度 ↓</option>
                    <option value="download-asc">下载速度 ↑</option>
                    <option value="download-desc">下载速度 ↓</option>
                    <option value="type-asc">设备类型 A-Z</option>
                    <option value="type-desc">设备类型 Z-A</option>
                </select>
            </div>
            <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">
                <span>🔄</span>
                <span>刷新缓存</span>
            </button>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        
        <div class="devices-grid" id="devicesGrid">
            <div class="empty-state">
                <div class="icon">📡</div>
                <p>正在加载设备信息...</p>
            </div>
        </div>
        
        <div class="last-update" id="lastUpdate">
            上次更新: --
        </div>
    </div>
    
    <script>
        let allDevices = [];
        let currentFilter = 'all';
        let currentSort = 'name-asc';
        
        function getDeviceTypeInfo(device) {
            const brand = (device.brand || '').toLowerCase();
            const model = (device.model || '').toLowerCase();
            const name = (device.name || '').toLowerCase();
            const type = device.type || '';
            
            if (model.includes('路由') || model.includes('router') || model.includes('tc') || model.includes('ax')) {
                return { type: 'router', icon: '🔌', label: '路由器' };
            }
            if (model.includes('电视') || model.includes('tv') || model.includes('bravia')) {
                return { type: 'tv', icon: '📺', label: '电视' };
            }
            if (model.includes('扫地') || model.includes('机器人') || model.includes('vacuum') || name.includes('camera') || name.includes('cam')) {
                return { type: 'smart', icon: '🏠', label: '智能设备' };
            }
            if (model.includes('ipad') || model.includes('平板') || brand.includes('苹果') && type === 'pc') {
                return { type: 'pad', icon: '📲', label: '平板' };
            }
            if (model.includes('matebook') || model.includes('笔记本') || model.includes('laptop')) {
                return { type: 'pc', icon: '💻', label: '笔记本' };
            }
            if (model.includes('iphone') || model.includes('mate') || model.includes('find') || model.includes('magic') || type === 'phone') {
                return { type: 'phone', icon: '📱', label: '手机' };
            }
            if (type === 'pc') {
                return { type: 'pc', icon: '💻', label: '电脑' };
            }
            
            return { type: 'unknown', icon: '❓', label: '未知' };
        }
        
        function renderDevices(devices) {
            const grid = document.getElementById('devicesGrid');
            
            if (devices.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📡</div>
                        <p>没有找到匹配的设备</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = devices.map(device => {
                const typeInfo = getDeviceTypeInfo(device);
                const displayName = device.name || device.model || device.brand || '未知设备';
                
                return `
                    <div class="device-card type-${typeInfo.type}">
                        <div class="device-header">
                            <div class="device-icon">${typeInfo.icon}</div>
                            <span class="device-type-badge badge-${typeInfo.type}">${typeInfo.label}</span>
                        </div>
                        <div class="device-name">${displayName}</div>
                        <div class="device-brand">${device.brand || ''} ${device.model || ''}</div>
                        
                        <div class="device-info">
                            <div class="info-item">
                                <span class="info-label">IP 地址</span>
                                <span class="info-value">${device.ip || '--'}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">在线时长</span>
                                <span class="info-value">${device.online_time_formatted || '--'}</span>
                            </div>
                        </div>
                        
                        <div class="speed-indicator">
                            <div class="speed-item upload">
                                <div class="speed-label">⬆️ 上传</div>
                                <div class="speed-value">${device.up_speed_formatted || '0 B/s'}</div>
                            </div>
                            <div class="speed-item download">
                                <div class="speed-label">⬇️ 下载</div>
                                <div class="speed-value">${device.down_speed_formatted || '0 B/s'}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function sortDevices(devices) {
            const [field, direction] = currentSort.split('-');
            
            return devices.sort((a, b) => {
                let aValue, bValue;
                
                switch (field) {
                    case 'name':
                        aValue = (a.name || a.model || a.brand || '未知设备').toLowerCase();
                        bValue = (b.name || b.model || b.brand || '未知设备').toLowerCase();
                        break;
                    case 'online':
                        aValue = a.online_time || 0;
                        bValue = b.online_time || 0;
                        break;
                    case 'upload':
                        aValue = a.up_speed || 0;
                        bValue = b.up_speed || 0;
                        break;
                    case 'download':
                        aValue = a.down_speed || 0;
                        bValue = b.down_speed || 0;
                        break;
                    case 'type':
                        aValue = getDeviceTypeInfo(a).label;
                        bValue = getDeviceTypeInfo(b).label;
                        break;
                    default:
                        return 0;
                }
                
                let result = 0;
                if (aValue < bValue) result = -1;
                if (aValue > bValue) result = 1;
                
                return direction === 'desc' ? -result : result;
            });
        }
        
        function filterDevices() {
            let filteredDevices;
            
            if (currentFilter === 'all') {
                filteredDevices = [...allDevices];
            } else {
                filteredDevices = allDevices.filter(device => {
                    const typeInfo = getDeviceTypeInfo(device);
                    return typeInfo.type === currentFilter;
                });
            }
            
            const sortedDevices = sortDevices(filteredDevices);
            renderDevices(sortedDevices);
        }
        
        async function fetchNetworkStatus() {
            try {
                const response = await fetch('/api/network-status');
                const data = await response.json();
                
                if (data.error) {
                    console.error('Network status error:', data.error);
                    return;
                }
                
                const wanStatusEl = document.getElementById('wanStatus');
                const wanCard = wanStatusEl.closest('.status-card');
                
                if (data.wan_connect === 'CONNECTED') {
                    wanStatusEl.textContent = '已连接';
                    wanCard.classList.add('connected');
                    wanCard.classList.remove('disconnected');
                } else {
                    wanStatusEl.textContent = '未连接';
                    wanCard.classList.add('disconnected');
                    wanCard.classList.remove('connected');
                }
                
                document.getElementById('wanUptime').textContent = data.wan_up_time || '--';
                document.getElementById('totalUpSpeed').textContent = data.total_up_speed || '--';
                document.getElementById('totalDownSpeed').textContent = data.total_down_speed || '--';
                
            } catch (error) {
                console.error('Failed to fetch network status:', error);
            }
        }
        
        async function fetchMonitorStatus() {
            try {
                const response = await fetch('/api/monitor-status');
                const data = await response.json();
                
                const monitorDot = document.getElementById('monitorDot');
                const monitorRunning = document.getElementById('monitorRunning');
                
                if (data.background_monitor_running) {
                    monitorDot.classList.add('running');
                    monitorRunning.textContent = '运行中';
                } else {
                    monitorDot.classList.remove('running');
                    monitorRunning.textContent = '已停止';
                }
                
                document.getElementById('aomEnabled').textContent = data.aom_enabled ? '已启用' : '未启用';
                document.getElementById('reportCount').textContent = data.report_count || 0;
                document.getElementById('lastReport').textContent = data.last_report_time || '--';
                document.getElementById('collectInterval').textContent = data.collect_interval + '秒';
                
            } catch (error) {
                console.error('Failed to fetch monitor status:', error);
                document.getElementById('monitorRunning').textContent = '获取失败';
            }
        }
        
        async function fetchDevices() {
            try {
                const response = await fetch('/api/devices');
                const data = await response.json();
                
                if (data.error) {
                    showError(data.error);
                    return;
                }
                
                allDevices = data.devices || [];
                filterDevices();
                
                document.getElementById('deviceCount').textContent = allDevices.length;
                document.getElementById('lastUpdate').textContent = '上次更新: ' + (data.timestamp || new Date().toLocaleString());
                
            } catch (error) {
                console.error('Failed to fetch devices:', error);
                showError('获取设备列表失败: ' + error.message);
            }
        }
        
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 5000);
        }
        
        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('loading');
            btn.querySelector('span:last-child').textContent = '刷新中...';
            
            try {
                await Promise.all([
                    fetchNetworkStatus(),
                    fetchMonitorStatus(),
                    fetchDevices()
                ]);
            } finally {
                btn.classList.remove('loading');
                btn.querySelector('span:last-child').textContent = '刷新缓存';
            }
        }
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                filterDevices();
            });
        });
        
        document.getElementById('sortSelect').addEventListener('change', function() {
            currentSort = this.value;
            filterDevices();
        });
        
        refreshData();
        
        setInterval(refreshData, 10000);
    </script>
</body>
</html>
